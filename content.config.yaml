# ─── CMS Content Configuration ───────────────────────────
# Defines the structure of CMS-managed pages.
# Each page is stored in PageContent (payload JSON) with
# optional PageGroupItems for repeatable sections.

pages:
  home:
    label: Homepage
    fields:
      headline:
        type: text
        label: Headline
        default: "Welcome to your dealer portal."
      headlineAccent:
        type: text
        label: Headline Accent (optional, second line)
        default: ""
      subheadline:
        type: text
        label: Subheadline
        default: "Wholesale ordering, dealer programs, and product information in one place."
      ctaText:
        type: text
        label: Hero CTA Button Text
        default: "Become a dealer"
      ctaHref:
        type: text
        label: Hero CTA Button Link
        default: "/become-a-dealer"
      heroImage:
        type: image
        label: Hero / above-the-fold image (optional)
        default: ""
      dependableHeading:
        type: text
        label: "Section: Dependable Tools — Heading"
        default: "Built to last,\nseason after season."
      dependableCta:
        type: text
        label: "Section: Dependable Tools — Inline CTA Text"
        default: "Ready to partner with us?"
      dependableCtaLinkText:
        type: text
        label: "Section: Dependable Tools — Inline CTA Link Text"
        default: "Open an account"
      dependableImage:
        type: image
        label: "Section: Dependable Tools — Image"
        default: ""
      howItWorksLabel:
        type: text
        label: "Section: How It Works — Label"
        default: "How it works"
      howItWorksBody:
        type: richtext
        label: "Section: How It Works — Body"
        default: "When you become a dealer, we start by understanding your market. We present competitive wholesale pricing, maintain reliable inventory, and support you with clean, professional branding that moves product off the shelf."
      gridImage1:
        type: image
        label: "Section: Image Grid — Left Image"
        default: ""
      gridImage2:
        type: image
        label: "Section: Image Grid — Right Image (overlay)"
        default: ""
      gridOverlayText:
        type: text
        label: "Section: Image Grid — Overlay Text"
        default: "Tools built to perform"
      brandsLabel:
        type: text
        label: "Section: Brands — Label"
        default: "Our brands"
      brandsIntro:
        type: text
        label: "Section: Brands — Intro"
        default: "Trusted product lines we stock and ship to dealers across the country."
      featuredCategoriesHeading:
        type: text
        label: "Section: Featured Categories — Heading"
        default: "Featured categories"
      featuredCategoriesIntro:
        type: text
        label: "Section: Featured Categories — Intro"
        default: "A snapshot of what dealers stock most."
      landscapeImage:
        type: image
        label: "Section: Landscape Image"
        default: ""
      faqLabel:
        type: text
        label: "Section: FAQ — Label"
        default: "Frequently asked questions"
      faqIntro:
        type: text
        label: "Section: FAQ — Intro"
        default: "Common questions from prospective dealers."
      ctaSectionTitle:
        type: text
        label: "Section: Final CTA — Title"
        default: "Ready to get started?"
      ctaSectionAccent:
        type: text
        label: "Section: Final CTA — Title Accent (optional)"
        default: ""
      ctaSectionTagline:
        type: text
        label: "Section: Final CTA — Tagline"
        default: "Wholesale ordering for retail partners."
      ctaSectionBody:
        type: text
        label: "Section: Final CTA — Body"
        default: "Tell us about your store and we'll set you up with wholesale pricing, reliable inventory, and dealer support."
      ctaSectionButtonText:
        type: text
        label: "Section: Final CTA — Button Text"
        default: "Contact us"
      ctaSectionButtonHref:
        type: text
        label: "Section: Final CTA — Button Link"
        default: "/contact"
    groups:
      features:
        label: Features
        fields:
          icon:
            type: text
            label: Icon (emoji or text)
          title:
            type: text
            label: Title
          description:
            type: text
            label: Description
      brands:
        label: Brands
        fields:
          name:
            type: text
            label: Brand Name
          category:
            type: text
            label: Brand Category / Tagline
          logo:
            type: image
            label: Brand Logo
      faqs:
        label: FAQs
        fields:
          number:
            type: text
            label: Number / Order (e.g. "01")
          question:
            type: text
            label: Question
          answer:
            type: richtext
            label: Answer

  about:
    label: About Page
    fields:
      title:
        type: text
        label: Page Title
        default: "About Us"
      heroImage:
        type: image
        label: Hero / Header Image
        default: ""
      body:
        type: richtext
        label: Body Content
        default: "Tell your company's story here. This page is fully managed from the admin — replace this default copy with your own."

  contact:
    label: Contact Page
    fields:
      title:
        type: text
        label: Page Title
        default: "Contact Us"
      subtitle:
        type: text
        label: Subtitle
        default: "Have questions? We'd love to hear from you."
      infoHeading:
        type: text
        label: Info Section Heading
        default: "Get in Touch"
      mapEmbedUrl:
        type: text
        label: Google Maps Embed URL (optional)
        default: ""

  become-a-dealer:
    label: Become a Dealer
    fields:
      title:
        type: text
        label: Page Title
        default: "Become a Dealer"
      description:
        type: text
        label: Page Description
        default: "Thank you for your interest in becoming a wholesale partner. Please complete the form below and our team will be in touch."

  products:
    label: Products Page
    fields:
      title:
        type: text
        label: Page Title
        default: "Product Catalog"
      description:
        type: text
        label: Page Description
        default: "Browse our full product line."

collections:
  blog:
    label: Blog Posts
    fields:
      title:
        type: text
        label: Title
      excerpt:
        type: text
        label: Excerpt
      body:
        type: richtext
        label: Body
      date:
        type: text
        label: Date
      image:
        type: image
        label: Featured Image
