# ─── CMS Content Configuration ───────────────────────────
# Defines the structure of CMS-managed pages.
# Each page is stored in PageContent (payload JSON) with
# optional PageGroupItems for repeatable sections.

pages:
  home:
    label: Homepage
    fields:
      headline:
        type: text
        label: Headline
        default: "Welcome to Bauman Custom Products"
      subheadline:
        type: text
        label: Subheadline
        default: "Supplying dependable agricultural and stable tool brands to dealers across Canada."
      ctaText:
        type: text
        label: CTA Button Text
        default: "Get Started"
      ctaHref:
        type: text
        label: CTA Button Link
        default: "/auth/login"
      ctaSectionTitle:
        type: text
        label: CTA Section Title
        default: "Become a BCP Dealer"
      ctaSectionBody:
        type: text
        label: CTA Section Body
        default: "We are actively expanding our dealer network across Canada. If you're looking to add dependable farm and stable tool programs to your store, we'd welcome the opportunity to work together."
    groups:
      features:
        label: Features
        fields:
          icon:
            type: text
            label: Icon (emoji or text)
          title:
            type: text
            label: Title
          description:
            type: text
            label: Description

  about:
    label: About Page
    fields:
      title:
        type: text
        label: Page Title
        default: "About Us"
      body:
        type: richtext
        label: Body Content

  contact:
    label: Contact Page
    fields:
      title:
        type: text
        label: Page Title
        default: "Contact Us"

collections:
  blog:
    label: Blog Posts
    fields:
      title:
        type: text
        label: Title
      excerpt:
        type: text
        label: Excerpt
      body:
        type: richtext
        label: Body
      date:
        type: text
        label: Date
      image:
        type: image
        label: Featured Image
