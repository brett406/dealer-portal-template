name: CI

on:
  pull_request:
  push:
    branches: [feature/media-management, main]

# A newer push to the same ref cancels the in-flight run.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · build · test · e2e
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dealer_portal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Single local Postgres for the whole job. DATABASE_TEST_URL is what test
      # mode (vitest) and the E2E seed use; DATABASE_URL is used by migrate/build.
      # Both point at the *_test database — never a real host.
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/dealer_portal_test
      DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/dealer_portal_test
      AUTH_SECRET: ci-only-not-a-real-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Apply migrations to the test database
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Unit + integration tests
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: End-to-end tests (Playwright)
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
