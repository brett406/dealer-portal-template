name: Database backup → Railway storage

# Off-platform-ish backup of the Railway Postgres into a Railway storage bucket.
# Runs on GitHub Actions (a different runner from the app) so an app-side
# deploy/build problem can't take out the backup job. The bucket is S3-compatible.
#
# Three retention tiers via path-based naming:
#   daily/YYYY-MM-DD.dump      (one object per day)
#   weekly/YYYY-Www.dump       (written Sundays)
#   monthly/YYYY-MM.dump       (written 1st of month)
# NOTE: Railway buckets have no lifecycle/expiry rules, so old objects are NOT
# auto-deleted. Dumps are small and storage is ~$0.015/GB-mo, so this is cheap;
# add a prune step later if it ever matters.
#
# Required GitHub secrets (see docs/backup-runbook.md):
#   DATABASE_URL          Railway Postgres PUBLIC connection string (proxy host)
#   S3_ENDPOINT           Bucket S3 endpoint, e.g. https://t3.storageapi.dev
#   S3_BUCKET             Globally-unique bucket name (e.g. <name>-ab12cd)
#   S3_ACCESS_KEY_ID      Bucket access key id
#   S3_SECRET_ACCESS_KEY  Bucket secret access key
#
# Optional secrets:
#   TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID   Failure ping (GitHub also emails).

on:
  # DORMANT IN THE TEMPLATE: no schedule here on purpose — the template's own DB
  # is not worth backing up nightly and a missing-secrets run would just spam
  # failures. Each FORK should re-add the daily schedule below and set the
  # required secrets (see docs/backup-runbook.md):
  #   schedule:
  #     - cron: "0 7 * * *"   # 07:00 UTC = 03:00 ET
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Install postgresql-client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client-16

      - name: Compute retention keys
        id: tier
        run: |
          DATE=$(date -u +%Y-%m-%d)
          DOW=$(date -u +%u)
          DOM=$(date -u +%d)
          WEEK=$(date -u +%G-W%V)
          MONTH=$(date -u +%Y-%m)
          {
            echo "date=$DATE"
            echo "daily_key=daily/$DATE.dump"
            echo "weekly_key=weekly/$WEEK.dump"
            echo "monthly_key=monthly/$MONTH.dump"
            echo "is_weekly=$([ "$DOW" = "7" ] && echo true || echo false)"
            echo "is_monthly=$([ "$DOM" = "01" ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

      - name: Validate secrets
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
        run: |
          for var in DATABASE_URL S3_ENDPOINT S3_BUCKET S3_ACCESS_KEY_ID S3_SECRET_ACCESS_KEY; do
            if [ -z "${!var}" ]; then
              echo "::error::$var secret is not set. See docs/backup-runbook.md."
              exit 1
            fi
          done

      - name: Dump database
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          pg_dump \
            --format=custom \
            --no-owner \
            --no-acl \
            --compress=9 \
            --verbose \
            --file=/tmp/db.dump \
            "$DATABASE_URL"
          ls -lh /tmp/db.dump

      - name: Validate dump is restorable
        # A corrupted dump that uploads "successfully" is silent failure. pg_restore
        # --list parses the table-of-contents — if the file is truncated or
        # unreadable, this fails before we upload.
        run: |
          ENTRIES=$(pg_restore --list /tmp/db.dump | grep -v '^;' | grep -v '^$' | wc -l)
          echo "Dump TOC entries: $ENTRIES"
          if [ "$ENTRIES" -lt 20 ]; then
            echo "::error::Dump has only $ENTRIES TOC entries — likely truncated or empty. Refusing to upload."
            exit 1
          fi

      - name: Upload daily backup
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          aws s3 cp /tmp/db.dump "s3://$S3_BUCKET/${{ steps.tier.outputs.daily_key }}" \
            --endpoint-url "$S3_ENDPOINT" \
            --no-progress

      - name: Upload weekly backup (Sundays)
        if: steps.tier.outputs.is_weekly == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          aws s3 cp /tmp/db.dump "s3://$S3_BUCKET/${{ steps.tier.outputs.weekly_key }}" \
            --endpoint-url "$S3_ENDPOINT" \
            --no-progress

      - name: Upload monthly backup (1st of month)
        if: steps.tier.outputs.is_monthly == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: |
          aws s3 cp /tmp/db.dump "s3://$S3_BUCKET/${{ steps.tier.outputs.monthly_key }}" \
            --endpoint-url "$S3_ENDPOINT" \
            --no-progress

      - name: Summary
        run: |
          echo "✔ Daily backup uploaded: ${{ steps.tier.outputs.daily_key }}"
          if [ "${{ steps.tier.outputs.is_weekly }}" = "true" ]; then
            echo "✔ Weekly backup uploaded: ${{ steps.tier.outputs.weekly_key }}"
          fi
          if [ "${{ steps.tier.outputs.is_monthly }}" = "true" ]; then
            echo "✔ Monthly backup uploaded: ${{ steps.tier.outputs.monthly_key }}"
          fi

      - name: Notify on failure (Telegram)
        # Pings a Telegram chat if anything above failed. No-op unless both
        # TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID are set as repo secrets.
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not set — skipping failure notification."
            exit 0
          fi
          MSG=$'🚨 DB backup failed in '"$REPO"$'\nRun: '"$RUN_URL"
          curl -sS -o /dev/null -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MSG}" \
            --data-urlencode "disable_web_page_preview=true"
